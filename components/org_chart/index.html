<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <style>
        body {
            font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
            background: #fafafa;
            padding: 20px;
            user-select: none;
        }

        .root-container {
            display: flex;
            justify-content: center;
            position: relative;
            margin-bottom: 40px;
        }

        .root-node {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background-color: #0b8e87;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: bold;
            z-index: 2;
        }

        .connecting-line {
            position: absolute;
            top: 100px;
            left: 50%;
            width: 2px;
            height: 30px;
            background-color: #cbd5e1;
            transform: translateX(-50%);
        }

        .horizontal-line {
            position: absolute;
            top: 130px;
            left: 16.66%;
            width: 66.66%;
            height: 2px;
            background-color: #cbd5e1;
        }

        .divisions-container {
            display: flex;
            justify-content: space-around;
            gap: 20px;
            position: relative;
            margin-top: 30px;
        }

        .division-column {
            flex: 1;
            border: 1px solid #0b8e87;
            background: white;
            border-radius: 8px;
            position: relative;
        }

        .division-column::before {
            content: "";
            position: absolute;
            top: -30px;
            left: 50%;
            width: 2px;
            height: 30px;
            background-color: #cbd5e1;
            transform: translateX(-50%);
        }

        .division-header {
            background: #e0f2fe;
            color: #0b8e87;
            padding: 15px;
            text-align: center;
            font-weight: bold;
            font-size: 16px;
            border-bottom: 1px solid #0b8e87;
            border-top-left-radius: 7px;
            border-top-right-radius: 7px;
        }

        .teams-container {
            padding: 10px;
            min-height: 100px;
        }

        .team-box {
            border: 1px dashed #cbd5e1;
            border-radius: 5px;
            margin-bottom: 10px;
            background: #ffffff;
            min-height: 50px;
            padding: 10px;
        }

        .team-name {
            font-weight: bold;
            margin-bottom: 10px;
            text-align: center;
            color: #000000;
            padding: 6px;
            background: #f1f5f9;
            border-bottom: 2px solid #0b8e87;
            border-radius: 4px 4px 0 0;
            cursor: text;
            transition: all 0.2s;
        }

        .team-name[contenteditable="true"]:focus {
            background: #e0f2fe;
            outline: none;
            border-bottom: 3px solid #0369a1;
        }

        .members-zone {
            min-height: 40px;
            display: flex;
            flex-wrap: wrap;
            align-content: flex-start;
            justify-content: center;
            padding-top: 5px;
        }

        .member-chip {
            background: #3b82f6;
            color: white;
            border-radius: 12px;
            padding: 4px 10px;
            margin: 3px;
            cursor: grab;
            font-size: 13px;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.1);
            transition: all 0.2s;
        }

        .member-chip:active {
            cursor: grabbing;
        }

        /* 👑 팀 리더(가장 첫 번째 인원) 강조 디자인! 정렬 플러그인에서 순서가 바뀌면 즉시 이 디자인도 적용됩니다 */
        .members-zone .member-chip:first-child {
            background-color: #f59e0b;
            /* 황금색/노란색 */
            font-weight: bold;
            box-shadow: 0 0 5px rgba(245, 158, 11, 0.5);
            border: 1px solid #b45309;
        }

        .members-zone .member-chip:first-child::before {
            content: "💼";
        }

        .add-team-btn {
            display: block;
            width: 100%;
            text-align: center;
            padding: 8px;
            background: #f1f5f9;
            color: #64748b;
            border: 1px dashed #cbd5e1;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            margin-top: 10px;
        }

        .add-team-btn:hover {
            background: #e2e8f0;
        }

        .bottom-container {
            display: flex;
            gap: 20px;
            margin-top: 40px;
        }

        .unassigned-wrapper {
            flex: 3;
            border: 2px dashed #93c5fd;
            padding: 20px;
            background: #eff6ff;
            border-radius: 8px;
            position: relative;
        }

        .trash-wrapper {
            flex: 1;
            border: 2px dashed #f43f5e;
            background: #fff1f2;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .unassigned-header {
            margin-top: 0;
            color: #2563eb;
            margin-bottom: 15px;
            font-size: 16px;
        }

        #unassigned-zone {
            min-height: 60px;
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            padding: 10px;
            background: white;
            border-radius: 5px;
        }

        .trash-title {
            color: #e11d48;
            margin-bottom: 10px;
            font-weight: bold;
            font-size: 18px;
        }

        #trash-zone {
            min-height: 100px;
            width: 100%;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        /* 수동 인원 추가 필드 */
        .manual-add-row {
            margin-bottom: 15px;
            display: flex;
            gap: 10px;
        }

        .manual-add-row input {
            flex: 1;
            padding: 8px;
            border: 1px solid #cbd5e1;
            border-radius: 4px;
            font-size: 14px;
            font-family: inherit;
        }

        .manual-add-row button {
            padding: 8px 15px;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }

        .manual-add-row button:hover {
            background: #2563eb;
        }

        .action-bar {
            margin-top: 20px;
            text-align: center;
        }

        .save-btn {
            padding: 12px 30px;
            background: #0b8e87;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            transition: all 0.2s;
        }

        .save-btn:hover {
            background: #09756f;
            transform: translateY(-1px);
        }
    </style>
</head>

<body>
    <div id="app">
        <!-- Root node layout -->
        <div class="root-container">
            <div class="root-node">소장</div>
            <div class="connecting-line"></div>
            <div class="horizontal-line"></div>
        </div>

        <div class="divisions-container" id="divisions-container"></div>

        <div class="bottom-container">
            <!-- Unassigned Zone -->
            <div class="unassigned-wrapper">
                <h3 class="unassigned-header">📋 대기열 (미배정 인원) - 이곳에서 인원을 팀으로 드래그 하세요!</h3>
                <div class="manual-add-row">
                    <input type="text" id="manual-name-in" placeholder="명단에 없는 사람을 수동으로 입력하세요 (예: 홍길동)">
                    <button id="manual-add-btn">수동 추가</button>
                </div>
                <div id="unassigned-zone"></div>
            </div>

            <!-- Trash Zone -->
            <div class="trash-wrapper">
                <div class="trash-title">🗑️ 쓰레기통</div>
                <div style="font-size:12px; color:#f43f5e; margin-bottom:5px;">(여기로 이름을 버리세요)</div>
                <div id="trash-zone"></div>
            </div>
        </div>

        <div class="action-bar">
            <button id="save-btn" class="save-btn">💾 현재 조작한 팀/팀장 구조 저장하기</button>
        </div>
    </div>

    <script>
        function sendMessageToStreamlitClient(type, data) {
            const outData = Object.assign({
                isStreamlitMessage: true,
                type: type,
            }, data);
            window.parent.postMessage(outData, "*");
        }
        function Streamlit_setFrameHeight() {
            // Wait slightly for DOM to settle
            setTimeout(() => {
                sendMessageToStreamlitClient("streamlit:setFrameHeight", { height: document.body.scrollHeight + 50 });
            }, 50);
        }
        function Streamlit_setComponentValue(value) {
            sendMessageToStreamlitClient("streamlit:setComponentValue", { value: value });
        }

        let loaded = false;
        window.addEventListener("message", function (event) {
            if (event.data.type === "streamlit:render") {
                const args = event.data.args;
                if (args.org_data && !loaded) {
                    loaded = true;
                    renderData(args.org_data, args.unassigned || []);
                }
                Streamlit_setFrameHeight();
            }
        });

        function createMemberChip(name) {
            const chip = document.createElement("div");
            chip.className = "member-chip";
            chip.textContent = name;
            chip.dataset.name = name;
            return chip;
        }

        function createTeamBox(teamName, members, divName) {
            const teamBox = document.createElement("div");
            teamBox.className = "team-box";

            const tHeader = document.createElement("div");
            tHeader.className = "team-name";
            tHeader.textContent = teamName || "새로운 팀";
            tHeader.title = "더블클릭하여 팀 이름을 수정할 수 있습니다.";
            tHeader.contentEditable = "true";
            tHeader.spellcheck = false;
            teamBox.appendChild(tHeader);

            const membersZone = document.createElement("div");
            membersZone.className = "members-zone";
            membersZone.dataset.div = divName;

            members.forEach(member => {
                membersZone.appendChild(createMemberChip(member));
            });
            teamBox.appendChild(membersZone);

            new Sortable(membersZone, {
                group: 'shared',
                animation: 150,
                onEnd: Streamlit_setFrameHeight
            });

            return teamBox;
        }

        function renderData(data, unassigned) {
            const container = document.getElementById("divisions-container");
            container.innerHTML = "";

            Object.keys(data).forEach(divName => {
                const divCol = document.createElement("div");
                divCol.className = "division-column";

                const divHeader = document.createElement("div");
                divHeader.className = "division-header";
                divHeader.textContent = divName;
                divCol.appendChild(divHeader);

                const teamsCont = document.createElement("div");
                teamsCont.className = "teams-container";

                const teamsObj = data[divName];
                Object.keys(teamsObj).forEach(teamName => {
                    teamsCont.appendChild(createTeamBox(teamName, teamsObj[teamName], divName));
                });

                const addBtn = document.createElement("div");
                addBtn.className = "add-team-btn";
                addBtn.textContent = "+ 팀 추가";
                addBtn.onclick = () => {
                    const newBox = createTeamBox("새로운 팀 " + (teamsCont.children.length + 1), [], divName);
                    teamsCont.insertBefore(newBox, addBtn);
                    Streamlit_setFrameHeight();
                };
                teamsCont.appendChild(addBtn);

                divCol.appendChild(teamsCont);
                container.appendChild(divCol);
            });

            const uz = document.getElementById("unassigned-zone");
            uz.innerHTML = "";
            unassigned.forEach(member => {
                uz.appendChild(createMemberChip(member));
            });

            new Sortable(uz, {
                group: 'shared',
                animation: 150,
                onEnd: Streamlit_setFrameHeight
            });

            // 쓰레기통
            const tz = document.getElementById("trash-zone");
            new Sortable(tz, {
                group: 'shared',
                animation: 150,
                onAdd: function (evt) {
                    // 항목이 쓰레기통에 떨어지면 아예 삭제해버림
                    evt.item.parentNode.removeChild(evt.item);
                }
            });
        }

        // 수동 추가 로직
        document.getElementById("manual-add-btn").addEventListener("click", () => {
            const inp = document.getElementById("manual-name-in");
            const val = inp.value.trim();
            if (val) {
                const uz = document.getElementById("unassigned-zone");
                uz.appendChild(createMemberChip(val));
                inp.value = "";
                Streamlit_setFrameHeight();
            }
        });

        document.getElementById("manual-name-in").addEventListener("keypress", (e) => {
            if (e.key === "Enter") {
                document.getElementById("manual-add-btn").click();
            }
        });

        // 데이터 전송
        document.getElementById("save-btn").addEventListener("click", () => {
            const result = {};
            const divisions = document.querySelectorAll(".division-column");
            divisions.forEach(divCol => {
                const divName = divCol.querySelector(".division-header").textContent;
                result[divName] = {};

                const teamBoxes = divCol.querySelectorAll(".team-box");
                teamBoxes.forEach(box => {
                    const teamName = box.querySelector(".team-name").textContent.trim();
                    if (teamName === "") return;

                    const members = Array.from(box.querySelectorAll(".members-zone .member-chip")).map(c => c.dataset.name);
                    if (result[divName][teamName]) {
                        result[divName][teamName + " (2)"] = members;
                    } else {
                        result[divName][teamName] = members;
                    }
                });
            });

            const unassigned = Array.from(document.querySelectorAll("#unassigned-zone .member-chip")).map(c => c.dataset.name);

            Streamlit_setComponentValue({
                org_data: result,
                unassigned: unassigned
            });

            const btn = document.getElementById("save-btn");
            btn.textContent = "✅ 저장 되었습니다!";
            btn.style.background = "#10b981";
            setTimeout(() => {
                btn.textContent = "💾 현재 조작한 팀/팀장 구조 저장하기";
                btn.style.background = "#0b8e87";
            }, 2000);
        });

        sendMessageToStreamlitClient("streamlit:componentReady", { apiVersion: 1 });
    </script>
</body>

</html>
