<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
  <style>
    body {
      font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
      padding: 8px;
      margin: 0;
      user-select: none;
      background: transparent;
    }

    .list-container {
      border: 2px solid #0b8e87;
      border-radius: 8px;
      padding: 8px;
      min-height: 50px;
      background: #f9fafb;
    }

    .member-row {
      display: flex;
      align-items: center;
      padding: 8px 12px;
      margin: 4px 0;
      background: white;
      border: 1px solid #e2e8f0;
      border-radius: 6px;
      cursor: grab;
      transition: background 0.15s, box-shadow 0.15s;
      box-shadow: 0 1px 2px rgba(0,0,0,0.05);
    }
    .member-row:active     { cursor: grabbing; }
    .member-row.sortable-ghost  { opacity: 0.35; }
    .member-row.sortable-chosen { box-shadow: 0 4px 14px rgba(0,0,0,0.18); }

    /* 팀장 (첫 번째) 강조 */
    .member-row.leader {
      background: #fffbeb;
      border: 2px solid #f59e0b;
    }

    /* 신규 인원 (엑셀에 있으나 미배정) */
    .member-row.new-member {
      background: #eff6ff;
      border: 1.5px dashed #93c5fd;
    }

    .rank-icon {
      font-size: 17px;
      min-width: 24px;
      margin-right: 6px;
    }
    .rank-num {
      color: #94a3b8;
      font-size: 12px;
      min-width: 22px;
      margin-right: 8px;
      font-weight: 600;
    }
    .member-name {
      font-size: 14px;
      font-weight: 500;
      flex: 1;
    }
    .new-badge {
      font-size: 11px;
      background: #3b82f6;
      color: white;
      padding: 2px 7px;
      border-radius: 10px;
      margin-left: 8px;
      font-weight: 600;
    }
    .drag-handle {
      color: #cbd5e1;
      margin-left: auto;
      font-size: 18px;
      padding-left: 10px;
    }

    .save-toast {
      text-align: center;
      color: #10b981;
      font-size: 12px;
      padding: 4px;
      height: 20px;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .save-toast.show { opacity: 1; }
  </style>
</head>
<body>
  <div class="list-container" id="sortable-list"></div>
  <div class="save-toast" id="save-toast">✅ 순서 자동 저장됨</div>

  <script>
    function sendToStreamlit(type, data) {
      window.parent.postMessage(Object.assign({ isStreamlitMessage: true, type }, data), "*");
    }
    function setHeight() {
      setTimeout(() => sendToStreamlit("streamlit:setFrameHeight", {
        height: document.body.scrollHeight + 10
      }), 50);
    }
    function setValue(value) {
      sendToStreamlit("streamlit:setComponentValue", { value });
    }

    let currentTeamKey = null;

    window.addEventListener("message", function(event) {
      if (event.data.type !== "streamlit:render") return;
      const args = event.data.args;

      // 팀이 바뀌면 컴포넌트 완전 초기화
      if (args.team_key !== currentTeamKey) {
        currentTeamKey = args.team_key;
        render(args.members || [], args.new_members || []);
      }
      setHeight();
    });

    function render(members, newMembers) {
      const list = document.getElementById("sortable-list");
      list.innerHTML = "";

      members.forEach(name => list.appendChild(createRow(name, false)));
      newMembers.forEach(name => list.appendChild(createRow(name, true)));

      refreshRanks();

      new Sortable(list, {
        animation: 150,
        ghostClass: "sortable-ghost",
        chosenClass: "sortable-chosen",
        onEnd: function() {
          refreshRanks();
          autoSave();
        }
      });
    }

    function createRow(name, isNew) {
      const row = document.createElement("div");
      row.className = "member-row" + (isNew ? " new-member" : "");
      row.dataset.name = name;

      const icon = document.createElement("span");
      icon.className = "rank-icon";

      const num = document.createElement("span");
      num.className = "rank-num";

      const nameEl = document.createElement("span");
      nameEl.className = "member-name";
      nameEl.textContent = name;

      const handle = document.createElement("span");
      handle.className = "drag-handle";
      handle.textContent = "⠿";

      row.appendChild(icon);
      row.appendChild(num);
      row.appendChild(nameEl);

      if (isNew) {
        const badge = document.createElement("span");
        badge.className = "new-badge";
        badge.textContent = "신규";
        row.appendChild(badge);
      }

      row.appendChild(handle);
      return row;
    }

    function refreshRanks() {
      const rows = document.querySelectorAll("#sortable-list .member-row");
      rows.forEach((row, i) => {
        const icon = row.querySelector(".rank-icon");
        const num  = row.querySelector(".rank-num");
        row.classList.remove("leader");

        if (i === 0) {
          icon.textContent = "💼";
          num.textContent  = "";
          row.classList.add("leader");
        } else {
          icon.textContent = "";
          num.textContent  = i + 1;
        }
      });
      setHeight();
    }

    function autoSave() {
      const rows = document.querySelectorAll("#sortable-list .member-row");
      const ordered = Array.from(rows).map(r => r.dataset.name);
      setValue({ ordered_members: ordered });

      const toast = document.getElementById("save-toast");
      toast.classList.add("show");
      setTimeout(() => toast.classList.remove("show"), 1800);
    }

    sendToStreamlit("streamlit:componentReady", { apiVersion: 1 });
  </script>
</body>
</html>
